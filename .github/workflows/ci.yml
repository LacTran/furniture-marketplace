name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-api:
    name: Build .NET API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Api/Api.csproj

      - name: Build API
        run: dotnet build Api/Api.csproj --no-restore -c Release

  web-app:
    name: Build & Lint Next.js Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Build Next.js
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://furniture-marketplace-jkp7.onrender.com

  mobile-app:
    name: Typecheck Expo Mobile App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: cd mobile && npm ci --legacy-peer-deps

      - name: Typecheck TypeScript
        run: cd mobile && npx tsc --noEmit
