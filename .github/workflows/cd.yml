name: CD Pipeline (Continuous Deployment)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy ASP.NET Core API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "Triggering Render API Deployment..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Render Deploy Hook Notice
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "RENDER_DEPLOY_HOOK_URL secret is not set. Render Auto-Deploy on push to main is active."

  deploy-web:
    name: Deploy Next.js Web App to Vercel
    runs-on: ubuntu-latest
    needs: [deploy-api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Build Web Artifacts
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Deploy Project Artifacts to Vercel Production
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Vercel Deploy Notice
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "VERCEL_TOKEN secret is not set. Vercel GitHub integration auto-deploys main commits."

  deploy-mobile:
    name: Publish Expo Mobile App OTA Update
    runs-on: ubuntu-latest
    needs: [deploy-api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo CLI
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: cd mobile && npm ci --legacy-peer-deps

      - name: Publish EAS OTA Update
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: cd mobile && npx eas-cli update --auto --non-interactive

      - name: Expo EAS Token Notice
        if: ${{ secrets.EXPO_TOKEN == '' }}
        run: |
          echo "EXPO_TOKEN secret is not set. Skipping EAS OTA deployment."
